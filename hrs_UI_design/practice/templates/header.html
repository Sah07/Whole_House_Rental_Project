

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="/static/css/header.css">
</head>
<body>
    <header class="main-header">
        <h1 class="logo"><a href="{% url 'landingpage' %}">HOUSE RENTAL SYSTEM</a></h1>
        <div class="menu-wrapper">
            <button class="menu-btn">Menu ▼</button>
            <nav class="nav-bar">
                <a href="/home/" class="{% if request.path == '/home/' %}active{% endif %}">Home</a>
                <a href="{% url 'aboutus' %}" class="{% if request.path == '/aboutus/' %}active{% endif %}">About</a>
                <a href="{% url 'service' %}" class="{% if request.path == '/services/' %}active{% endif %}">Services</a>

            </nav>
        </div>
        {% if user.is_authenticated %}
            <a href="{% url 'logout' %}" class="login-link">Logout</a>
        {% else %}
            <a href="/login/" class="login-link {% if request.path == '/login/' %}active{% endif %}" >Login</a>
        {% endif %}

    </header>




    <script src="/static/script/header.js"></script>
</body>
</html>
