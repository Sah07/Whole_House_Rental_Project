<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Landlord Info</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 40px;
            background-color: #f9f9f9;
        }
        .info-box {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h2 {
            color: #007bff;
            text-align: center;
        }
        p {
            font-size: 18px;
            color: #333;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="info-box">
        <h2>Landlord Contact Details</h2>
        <p><strong>Name:</strong> {{ landlord.first_name }} {{ landlord.last_name }}</p>
        <p><strong>Email:</strong> {{ landlord.email }}</p>
        <p><strong>Phone:</strong> {{ landlord.profile.phone_num }}</p>
    </div>
</body>
</html>
